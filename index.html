<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>皮皮 iOS 座標模擬器</title>
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./app.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-content">
      <section class="sidebar-section">
        <h2>目前座標</h2>
        <label for="selectTunnel">tunneld 設備</label>
        <div class="row">
          <select id="selectTunnel"></select>
          <button type="button" class="btn-icon" id="btnRefreshTunnel" data-tooltip="重新整理設備">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
              <path d="M8 16H3v5"/>
            </svg>
          </button>
        </div>
        <hr>
        <label for="presetCoords">純點</label>
        <select id="presetCoords">
          <option value="">請選擇座標</option>
        </select>
        <hr>
        <label for="inputCoords">GPS 座標（緯度, 經度）</label>
        <div class="row">
          <input type="text" id="inputCoords" placeholder="40.720638, -74.000816" autocomplete="off" />
          <button type="button" class="btn-icon" id="btnMove" data-tooltip="移動">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor">
              <path d="M90.34,61.66a8,8,0,0,1,0-11.32l32-32a8,8,0,0,1,11.32,0l32,32a8,8,0,0,1-11.32,11.32L136,43.31V96a8,8,0,0,1-16,0V43.31L101.66,61.66A8,8,0,0,1,90.34,61.66Zm64,132.68L136,212.69V160a8,8,0,0,0-16,0v52.69l-18.34-18.35a8,8,0,0,0-11.32,11.32l32,32a8,8,0,0,0,11.32,0l32-32a8,8,0,0,0-11.32-11.32Zm83.32-72-32-32a8,8,0,0,0-11.32,11.32L212.69,120H160a8,8,0,0,0,0,16h52.69l-18.35,18.34a8,8,0,0,0,11.32,11.32l32-32A8,8,0,0,0,237.66,122.34ZM43.31,136H96a8,8,0,0,0,0-16H43.31l18.35-18.34A8,8,0,0,0,50.34,90.34l-32,32a8,8,0,0,0,0,11.32l32,32a8,8,0,0,0,11.32-11.32Z"/>
            </svg>
          </button>
          <button type="button" class="btn-icon" id="btnRecenter" data-tooltip="回到現實位置">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="15" height="15" fill="currentColor">
              <path d="M128,64a40,40,0,1,0,40,40A40,40,0,0,0,128,64Zm0,64a24,24,0,1,1,24-24A24,24,0,0,1,128,128Zm0-112a88.1,88.1,0,0,0-88,88c0,31.4,14.51,64.68,42,96.25a254.19,254.19,0,0,0,41.45,38.3,8,8,0,0,0,9.18,0A254.19,254.19,0,0,0,174,200.25c27.45-31.57,42-64.85,42-96.25A88.1,88.1,0,0,0,128,16Zm0,206c-16.53-13-72-60.75-72-118a72,72,0,0,1,144,0C200,161.23,144.53,209,128,222Z"/>
            </svg>
          </button>
        </div>
      </section>
      <section class="sidebar-section">
        <h2>定時移動</h2>
        <label>時速 (km/h)</label>
        <input type="number" id="inputSpeed" placeholder="18" min="0" step="1" value="18" />
        <p class="speed-hint" id="speedHint">約 5.0 m/s（每秒移動距離）</p>
        <label>持續時間 (分鐘)</label>
        <input type="number" id="inputDuration" placeholder="60" min="1" step="1" value="60" />
        <label>方位</label>
        <select id="inputDir">
          <option value="N">北</option>
          <option value="E">東</option>
          <option value="S">南</option>
          <option value="W">西</option>
        </select>
        <div class="row" style="margin-top:8px;">
          <button type="button" class="btn" id="btnStart">開始</button>
          <button type="button" class="btn danger" id="btnStop" disabled>停止</button>
        </div>
      </section>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" data-tooltip="收合側欄">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </button>
    </aside>
    <div class="right">
      <header>
        <span class="coords">目前座標：<strong id="cur">--</strong></span>
        <span id="status" class="status" style="display:none;"></span>
      </header>
      <div class="map-wrap">
        <div id="map"></div>
        <div class="hint">點選地圖即可將該點設為裝置模擬位置</div>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./app.js"></script>
</body>

</html>
